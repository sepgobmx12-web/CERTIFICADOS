<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validación de Certificados y Certificaciones de Educación Básica (CERTELEC-SEDUC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; background-color: #1a1a1a; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
        .bg-footer-custom { background-color: #9e8a6d; }
        .card-bg-triangles { background-image: url('https://i.ibb.co/rKzsLcZX/Gemini-Generated-Image-mw9u7cmw9u7cmw9u.png'); background-size: 100% auto; background-repeat: no-repeat; background-position: center top; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background-color: white; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        #modalOverlay { display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 50; align-items: center; justify-content: center; }
        #modalOverlay.active { display: flex; }
    </style>
</head>
<body>
    <div id="modalOverlay">
        <div class="bg-white w-[90%] max-w-[320px] rounded-3xl shadow-2xl overflow-hidden border border-gray-200 relative">
            <div class="bg-[#be9e6f] text-white p-4 text-center relative">
                <h2 class="text-base font-semibold">Informacion</h2>
                <button onclick="document.getElementById('modalOverlay').classList.remove('active')" class="absolute top-1/2 right-4 -translate-y-1/2 text-white/70 hover:text-white text-xl font-bold">×</button>
            </div>
            <div class="p-4 space-y-3 text-sm bg-[#f8f9fa]">
                <div><div class="bg-[#e2dcc9] text-[#5c5545] px-3 py-1 rounded-t-lg font-medium text-xs">Nombre Alumno</div><div id="m_alumno" class="bg-white border border-gray-200 px-3 py-1.5 rounded-b-lg text-gray-800 text-sm shadow-inner"></div></div>
            </div>
        </div>
    </div>

    <div class="app-container relative">
        <div class="bg-white shrink-0 border-b-2 border-[#d5d5d5]"><img src="https://i.ibb.co/nM5NHqwx/logos-completos.jpg" class="w-full h-auto"></div>
        <div class="flex-1 card-bg-triangles flex flex-col p-2">
            <div class="flex justify-end mb-1"><button onclick="document.getElementById('modalOverlay').classList.add('active')" class="flex items-center space-x-1 bg-[#f4ebd9] border border-[#be9e6f] rounded-md px-1.5 py-0.25"><span class="text-[6px] font-bold text-[#7f643f] uppercase">Ver Información</span></button></div>
            <div class="rounded-lg p-1.5 space-y-1 text-[6.5px] border border-gray-200 bg-[#f1f8f1]">
                <div class="bg-[#be9e6f] text-white text-center font-bold text-[5.5px] py-0.25 rounded uppercase my-0.5">Datos del Alumno(a)</div>
                <div class="text-[6px]"><span class="bg-[#ebdcb9] text-[#7f643f] font-bold px-1 py-0.25 rounded mr-1">Nombre:</span><span id="v_alumno"></span></div>
                <div class="flex justify-between items-center text-[6px] pt-0.5">
                    <div><span class="bg-[#ebdcb9] text-[#7f643f] font-bold px-1 py-0.25 rounded mr-1">CURP:</span><span id="v_curp"></span></div>
                    <div><span class="bg-[#ebdcb9] text-[#7f643f] font-bold px-1 py-0.25 rounded mr-1">Sexo:</span><span>FEMENINO</span></div>
                </div>
                <div class="bg-[#be9e6f] text-white text-center font-bold text-[5.5px] py-0.25 rounded uppercase my-0.5">Datos de la Escuela</div>
                <div class="flex justify-between items-center text-[6px]">
                    <div><span class="bg-[#ebdcb9] text-[#7f643f] font-bold px-1 py-0.25 rounded mr-1">C.C.T.:</span><span id="v_cct"></span></div>
                    <div><span class="bg-[#ebdcb9] text-[#7f643f] font-bold px-1 py-0.25 rounded mr-1">Turno:</span><span id="v_turno"></span></div>
                </div>
                <div class="text-[6px] pt-0.25"><b>Nombre:</b> JARDIN DE NIÑOS QUETZALCOATL</div>
                <div class="bg-[#be9e6f] text-white text-center font-bold text-[5.5px] py-0.25 rounded uppercase my-0.5">Promedio Final</div>
                <div class="text-center text-xs text-neutral-800">C</div>
                <div class="flex justify-between text-[5px] pt-1">
                    <div><b>Folio:</b> <span id="v_folio">-</span></div>
                    <div><b>Certificado:</b> <span id="v_cert"></span></div>
                </div>
            </div>
        </div>
        <div class="bg-footer-custom text-white px-2 py-2 text-[5px] text-center">Gobierno del Estado de México - CERTELEC-SEDUC</div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        function f(id, key) { 
            const el = document.getElementById(id);
            const val = p.get(key);
            if (el) el.innerText = val ? val.replace(/_/g, " ") : ""; 
        }
        f('v_alumno','alumno'); f('m_alumno','alumno'); f('v_curp','curp'); f('v_cct','cct'); f('v_turno','turno'); f('v_folio','folio');
        const cert = p.get('num_cert');
        if(document.getElementById('v_cert')) document.getElementById('v_cert').innerText = cert ? cert.split(']')[0] : "";
    </script>
</body>
</html>
