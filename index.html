<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100dvh; margin: 0; }
        .app-container { width: 100%; max-width: 340px; height: 680px; background: white; border-radius: 40px; border: 10px solid #262626; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="https://i.ibb.co/nM5NHqwx/logos-completos.jpg" class="w-full">
        <div class="p-3 text-[7px] space-y-1">
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded">DATOS DEL ALUMNO(A)</div>
            <div><b>Nombre:</b> <span id="disp_alumno"></span></div>
            <div class="flex justify-between">
                <div><b>CURP:</b> <span id="disp_curp"></span></div>
                <div><b>Sexo:</b> FEMENINO</div>
            </div>
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded">DATOS DE LA ESCUELA</div>
            <div><b>C.C.T.:</b> <span id="disp_cct"></span> <b>Turno:</b> <span id="disp_turno"></span></div>
            <div><b>Nombre:</b> JARDIN DE NIÑOS QUETZALCOATL</div>
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded mt-2">PROMEDIO FINAL</div>
            <div class="text-center text-lg font-bold">C</div>
            
            <div class="flex pt-4 gap-2">
                <div class="w-1/2 bg-[#e2dcc9] p-1 rounded"><b>Número de folio</b><br><span id="disp_folio">-</span></div>
                <div class="w-1/2 bg-[#e2dcc9] p-1 rounded overflow-hidden"><b>Número de certificado</b><br><span id="disp_cert" class="break-all"></span></div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function set(id, param) {
            const val = params.get(param);
            document.getElementById(id).innerText = val ? val.replace(/_/g, " ") : "N/A";
        }
        set('disp_alumno', 'alumno');
        set('disp_curp', 'curp');
        set('disp_cct', 'cct');
        set('disp_turno', 'turno');
        set('disp_folio', 'folio');
        // Aquí forzamos que solo se muestre el ID real, no el link entero
        const cert = params.get('num_cert');
        document.getElementById('disp_cert').innerText = cert ? cert.split(']')[0] : "N/A";
    </script>
</body>
</html>
