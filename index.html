<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; background-color: #1a1a1a; margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .bg-footer-custom { background-color: #9e8a6d; }
        .card-bg-triangles { background-image: url('https://i.ibb.co/rKzsLcZX/Gemini-Generated-Image-mw9u7cmw9u7cmw9u.png'); background-size: 100% auto; background-repeat: no-repeat; background-position: center top; background-color: #f1f8f1; }
        .app-container { width: 100%; height: 100dvh; background-color: white; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 420px) { .app-container { width: 340px !important; height: 680px !important; border-radius: 40px !important; border: 10px solid #262626 !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7) !important; margin: auto; } }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="https://i.ibb.co/nM5NHqwx/logos-completos.jpg" class="w-full">
        <div class="flex-1 card-bg-triangles p-2 text-[6px]">
            <!-- Datos Alumno -->
            <div class="bg-[#be9e6f] text-white text-center font-bold text-[5.5px] py-0.25 rounded uppercase my-0.5">Datos del Alumno(a)</div>
            <div><span class="font-bold">Nombre:</span> <span id="disp_alumno" class="text-gray-800"></span></div>
            <div class="flex justify-between">
                <div><span class="font-bold">CURP:</span> <span id="disp_curp"></span></div>
                <div><span class="font-bold">Sexo:</span> FEMENINO</div>
            </div>
            <!-- Datos Escuela -->
            <div class="bg-[#be9e6f] text-white text-center font-bold text-[5.5px] py-0.25 rounded uppercase my-0.5">Datos de la Escuela</div>
            <div class="flex justify-between">
                <div><span class="font-bold">C.C.T.:</span> <span id="disp_cct"></span></div>
                <div><span class="font-bold">Turno:</span> <span id="disp_turno"></span></div>
            </div>
            <div><span class="font-bold">Nombre:</span> JARDIN DE NIÑOS QUETZALCOATL</div>
            <!-- Folio y Certificado -->
            <div class="flex justify-between pt-2 text-[5px]">
                <div class="text-center"><span class="block font-bold">Número de folio</span><span id="disp_folio">-</span></div>
                <div class="text-center"><span class="block font-bold">Número de certificado</span><span id="disp_cert" class="text-[4.5px]"></span></div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function set(id, param) {
            const el = document.getElementById(id);
            if (el) {
                const val = params.get(param);
                el.innerText = val ? val.replace(/_/g, " ") : "Dato no encontrado";
            }
        }
        set('disp_alumno', 'alumno');
        set('disp_curp', 'curp');
        set('disp_cct', 'cct');
        set('disp_turno', 'turno');
        set('disp_folio', 'folio');
        set('disp_cert', 'num_cert');
    </script>
</body>
</html>
