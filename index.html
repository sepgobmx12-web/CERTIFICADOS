<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* (Tus estilos actuales siguen igual) */
        body { font-family: Arial, Helvetica, sans-serif; background-color: #1a1a1a; margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .bg-footer-custom { background-color: #9e8a6d; }
        .card-bg-triangles { background-image: url('https://i.ibb.co/rKzsLcZX/Gemini-Generated-Image-mw9u7cmw9u7cmw9u.png'); background-size: 100% auto; background-repeat: no-repeat; background-position: center top; }
        .app-container { width: 100%; height: 100dvh; background-color: white; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        @media (min-width: 420px) { .app-container { width: 340px !important; height: 680px !important; border-radius: 40px !important; border: 10px solid #262626 !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7) !important; margin: auto; } }
        #modalOverlay { display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 50; align-items: center; justify-content: center; }
        #modalOverlay.active { display: flex; }
    </style>
</head>
<body>

    <!-- Modal (con IDs para rellenar) -->
    <div id="modalOverlay">
        <div class="bg-white w-[90%] max-w-[320px] rounded-3xl p-4">
            <h2 class="text-center font-bold">Información</h2>
            <div id="modalContent" class="text-sm mt-4 space-y-2">
                <!-- Se llenará automáticamente -->
            </div>
            <button onclick="document.getElementById('modalOverlay').classList.remove('active')" class="w-full mt-4 bg-red-500 text-white p-2 rounded">Cerrar</button>
        </div>
    </div>

    <div class="app-container">
        <img src="https://i.ibb.co/nM5NHqwx/logos-completos.jpg" class="w-full">
        <div class="flex-1 p-4">
            <h1 id="disp_alumno" class="font-bold text-xl">Cargando...</h1>
            <p id="disp_curp">CURP: ...</p>
            <p id="disp_escuela">Escuela: ...</p>
            <p id="disp_cert">Certificado: ...</p>
        </div>
    </div>

    <script>
        // Esta función lee lo que viene en el link
        const params = new URLSearchParams(window.location.search);
        
        // Función para limpiar los guiones bajos (_) y poner espacios
        function set(id, param) {
            const val = params.get(param) || "No disponible";
            document.getElementById(id).innerText = val.replace(/_/g, " ");
        }

        // Rellenar datos
        set('disp_alumno', 'alumno');
        set('disp_curp', 'curp');
        set('disp_escuela', 'escuela');
        set('disp_cert', 'num_cert');
    </script>
</body>
</html>
