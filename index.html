<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: white; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Logo -->
        <img src="https://i.ibb.co/nM5NHqwx/logos-completos.jpg" class="w-full">
        
        <!-- Contenido -->
        <div class="p-4 space-y-2 text-[10px]">
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded">DATOS DEL ALUMNO(A)</div>
            <div><b>Nombre:</b> <span id="v_alumno"></span></div>
            <div><b>CURP:</b> <span id="v_curp"></span></div>
            
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded">DATOS DE LA ESCUELA</div>
            <div><b>C.C.T.:</b> <span id="v_cct"></span></div>
            <div><b>Turno:</b> <span id="v_turno"></span></div>
            <div><b>Nombre:</b> JARDIN DE NIÑOS QUETZALCOATL</div>
            
            <div class="bg-[#be9e6f] text-white text-center font-bold py-1 rounded">PROMEDIO FINAL</div>
            <div class="text-center text-lg">C</div>
            
            <div class="flex justify-between pt-4">
                <div><b>Número de folio:</b> <span id="v_folio">-</span></div>
                <div><b>Número de certificado:</b> <span id="v_cert"></span></div>
            </div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        function f(id, key) { 
            const el = document.getElementById(id);
            const val = p.get(key);
            if (el) el.innerText = val ? val.replace(/_/g, " ") : ""; 
        }
        f('v_alumno','alumno'); 
        f('v_curp','curp'); 
        f('v_cct','cct'); 
        f('v_turno','turno'); 
        f('v_folio','folio');
        
        const cert = p.get('num_cert');
        document.getElementById('v_cert').innerText = cert ? cert.split(']')[0] : "";
    </script>
</body>
</html>
